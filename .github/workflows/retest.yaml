name: Detect and Trigger Retest
on:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read

jobs:
  retest:
    runs-on: ubuntu-latest
    if: github.event.comment.body == '/retest'
    permissions: 
      actions: write
    steps:
      - name: Retest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          SHA_REF=$(gh api "/repos/$REPO/pulls/$PR_NUMBER/commits?per_page=1" | jq -r '.[].sha' | tail -n 1)
          echo $SHA_REF
          RUN_ID=$(gh api "repos/$REPO/actions/workflows/ci-build.yaml/runs?event=pull_request&head_sha=$SHA_REF" | jq -r '.workflow_runs[] | .id')
          echo $RUN_ID
          gh api --method POST repos/$REPO/actions/runs/$RUN_ID/rerun-failed-jobs
